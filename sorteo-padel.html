  #pantallaSorteo::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background: linear-gradient(to bottom, rgba(26,15,10,0.35) 0%, rgba(26,15,10,0.55) 100%);
    pointer-events: none;
  }

  /* todo lo visible sobre el fondo */
  #pantallaInicio > *, #pantallaSorteo > * { position: relative; z-index: 1; }
  #pantallaInicio, #pantallaSorteo { position: relative; }

  /* ══ PANTALLA INICIO ══ */
  #pantallaInicio {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  header {
    background: transparent;
    
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--gris3);
    display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 10;
  }
  .logo { font-size: 28px; }
  header h1 { font-size: 18px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; color: var(--crema); }
  header span { font-size: 11px; color: rgba(255,255,255,0.75); font-weight: 500; display: block; text-transform: uppercase; letter-spacing: 0.8px; }

  .container { max-width: 480px; margin: 0 auto; padding: 0 16px; width: 100%; }

  /* ── BARRA FIJA ABAJO ── */
  .add-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 20;
    background: rgba(10,4,0,0.82);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-top: 1px solid rgba(255,107,26,0.25);
    padding: 10px 16px 20px;
    max-width: 100%;
  }

  .add-bar-pos {
    display: flex; gap: 6px; margin-bottom: 8px;
  }

  .add-bar-row {
    display: flex; gap: 8px; align-items: center;
  }

  .btn-add-inline {
    flex-shrink: 0;
    width: 48px; height: 48px;
    background: var(--naranja); color: #fff; border: none;
    border-radius: 12px; font-size: 26px; font-weight: 900;
    font-family: 'Inter', sans-serif; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .btn-add-inline:hover { background: var(--naranja-dark); }

  /* Espacio para que el contenido no quede tapado por la barra fija */
  #pantallaInicio .container { padding-bottom: 140px; }

  /* ── AGREGAR (old, keep for input styles) ── */
  .add-section { background: transparent; border-radius: 16px; padding: 16px; margin: 16px 0; border: 1px solid rgba(255,107,26,0.2); }
  .add-section h2 { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  input[type="text"] {
    flex: 1; background: rgba(0,0,0,0.25); border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 10px; color: var(--crema); font-size: 16px; font-weight: 700;
    font-family: 'Inter', sans-serif; padding: 11px 14px; outline: none;
    transition: border-color 0.15s; text-transform: uppercase; letter-spacing: 0.5px;
  }
  input[type="text"]:focus { border-color: var(--naranja); }
  input[type="text"]::placeholder { color: rgba(255,255,255,0.5); font-weight: 500; text-transform: none; letter-spacing: 0; }

  .pos-selector { display: flex; gap: 6px; margin-bottom: 12px; }
  .pos-btn {
    flex: 1; padding: 9px 4px; border-radius: 9px; border: 2px solid rgba(255,255,255,0.3);
    background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.8); font-size: 12px; font-weight: 700;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
    text-align: center; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .pos-btn.active-drive       { border-color: var(--drive);       background: rgba(255,217,61,0.12);  color: var(--drive); }
  .pos-btn.active-reves       { border-color: var(--reves);       background: rgba(255,107,26,0.12);  color: var(--reves); }
  .pos-btn.active-indiferente { border-color: var(--indiferente); background: rgba(255,159,67,0.12); color: var(--indiferente); }

  .btn-agregar {
    width: 100%; padding: 13px; background: var(--naranja); color: #fff; border: none;
    border-radius: 11px; font-size: 14px; font-weight: 900; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: background 0.15s; text-transform: uppercase; letter-spacing: 1px;
  }
  .btn-agregar:hover { background: var(--naranja-dark); }

  /* ── LISTA ── */
  .jugadores-section { margin-bottom: 16px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding: 0 2px; }
  .section-header h2 { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 1.5px; }
  .count-badge { background: rgba(255,255,255,0.12); border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase; }
  .count-badge.ok { background: rgba(255,107,26,0.15); color: var(--naranja); }

  .jugador-item {
    background: transparent; border-radius: 11px; padding: 12px 14px; margin-bottom: 7px;
    display: flex; align-items: center; gap: 10px; animation: fadeIn 0.2s ease;
    border: 1px solid rgba(255,255,255,0.2);
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

  .pos-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .pos-dot.drive       { background: var(--drive); }
  .pos-dot.reves       { background: var(--reves); }
  .pos-dot.indiferente { background: var(--indiferente); }

  .jugador-nombre { flex: 1; font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--crema); }
  .pos-label { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.8px; }
  .pos-label.drive       { background: rgba(255,217,61,0.15);  color: var(--drive); }
  .pos-label.reves       { background: rgba(255,107,26,0.15);  color: var(--reves); }
  .pos-label.indiferente { background: rgba(255,159,67,0.15); color: var(--indiferente); }

  .btn-del { background: none; border: none; color: rgba(255,255,255,0.8); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 4px; border-radius: 6px; transition: color 0.15s; }
  .btn-del:hover { color: var(--coral); }

  .empty-state { text-align: center; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; padding: 24px; background: transparent; border-radius: 11px; border: 1.5px dashed rgba(255,107,26,0.25); text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── SORTEO SECTION ── */
  .sorteo-section { background: transparent; border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid rgba(255,107,26,0.2); }
  .sorteo-section h2 { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.8); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }

  .modo-selector { display: flex; gap: 6px; margin-bottom: 14px; }
  .modo-btn {
    flex: 1; padding: 10px 8px; border-radius: 9px; border: 2px solid var(--gris3);
    background: transparent; color: var(--gris4); font-size: 11px; font-weight: 700;
    font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
    text-align: center; line-height: 1.4; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .modo-btn.active { border-color: var(--naranja); background: rgba(255,107,26,0.12); color: var(--naranja); }

  .btn-sortear {
    width: 100%; padding: 16px; background: var(--naranja); color: #fff; border: none;
    border-radius: 12px; font-size: 17px; font-weight: 900; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: all 0.15s; letter-spacing: 2px; text-transform: uppercase;
    box-shadow: 0 4px 20px rgba(255,107,26,0.35);
  }
  .btn-sortear:hover { background: var(--naranja-dark); transform: scale(0.99); }

  .error-msg { background: rgba(255,71,87,0.12); border: 1.5px solid rgba(255,71,87,0.3); border-radius: 9px; padding: 10px 13px; font-size: 13px; color: #ff8a95; margin-bottom: 12px; display: none; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }

  .divider { height: 1px; background: rgba(255,255,255,0.2); margin: 12px 0; }
  .btn-limpiar { width: 100%; padding: 11px; background: transparent; color: var(--coral); border: 1.5px solid rgba(255,71,87,0.3); border-radius: 10px; font-size: 12px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 1px; }
  .btn-limpiar:hover { background: rgba(255,71,87,0.08); }

  #pantallaSorteo {

    position: fixed;
    inset: 0;
    background: transparent;
    z-index: 50;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;

  .sorteo-feed {
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 60px;

  .sorteo-feed-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;

    font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.8);

    width: 7px; height: 7px; border-radius: 50%;

  }
  .feed-dot.done    { background: var(--naranja); }
  .feed-dot.current { background: var(--amarillo); transform: scale(1.6); box-shadow: 0 0 8px var(--amarillo); }

  /* ── CARD FEED ── */
  .feed-card {
    border-radius: 20px;
    background: transparent;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 2px solid rgba(255,107,26,0.2);
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.4s, box-shadow 0.4s;
    animation: cardDrop 0.4s cubic-bezier(0.34, 1.3, 0.64, 1) both;
  }
  @keyframes cardDrop {
    from { opacity: 0; transform: translateY(-18px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .feed-card.locked {
    border-color: var(--naranja);
    box-shadow: 0 0 0 1px rgba(255,107,26,0.2), 0 4px 24px rgba(255,107,26,0.12);

  .feed-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 10px;
  }
  .feed-card-num {
    font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7);
    text-transform: uppercase; letter-spacing: 2px;
    transition: color 0.3s;
  }
  .feed-card.locked .feed-card-num { color: var(--naranja); }
  .feed-card-check { font-size: 16px; opacity: 0; transition: opacity 0.3s; }
  .feed-card.locked .feed-card-check { opacity: 1; }

  /* Slot cols */
  .feed-slot-cols {
    display: flex; gap: 10px; align-items: center;
    padding: 0 14px 16px;
  }
  .feed-slot-col {
    flex: 1; height: 130px; border-radius: 14px;
    background: transparent; overflow: hidden; position: relative;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .feed-slot-col::before,
  .feed-slot-col::after {
    content: ''; position: absolute; left: 0; right: 0; height: 32px; z-index: 2; pointer-events: none;
  }
  .feed-slot-col::before { top: 0;    background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent); }
  .feed-slot-col::after  { bottom: 0; background: linear-gradient(to top,   rgba(0,0,0,0.4), transparent); }

  .feed-reel { display: flex; flex-direction: column; will-change: transform; }
  .feed-slot-item {
    height: 130px; flex-shrink: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px; text-align: center;
  }

  /* NOMBRES GRANDES en el slot */
  .feed-slot-nombre {
    font-size: 26px; font-weight: 900;
    letter-spacing: -0.5px; line-height: 1.1;
    text-transform: uppercase; color: #fff;

  .feed-slot-pos {
    font-size: 10px; font-weight: 700; margin-top: 7px;
    padding: 3px 9px; border-radius: 5px; text-transform: uppercase; letter-spacing: 1px;
  }
  .feed-slot-pos.drive       { background: rgba(255,217,61,0.18);  color: var(--drive); }
  .feed-slot-pos.reves       { background: rgba(255,107,26,0.18);  color: var(--reves); }
  .feed-slot-pos.indiferente { background: rgba(255,159,67,0.18); color: var(--indiferente); }

  .feed-plus { font-size: 22px; font-weight: 900; color: rgba(255,255,255,0.6); flex-shrink: 0; }

  /* Confirmada */
  .feed-confirmed-cols {
    display: flex; gap: 10px; align-items: center;
    padding: 0 14px 16px;
  }
  .feed-conf-pj {
    flex: 1; background: transparent; border-radius: 12px;
    padding: 14px 10px; text-align: center; border: 1px solid rgba(255,255,255,0.2);
  }
  .feed-conf-nombre {
    font-size: 22px; font-weight: 900; text-transform: uppercase;
    letter-spacing: -0.3px; color: #fff;
  }
  .feed-conf-pos { font-size: 10px; font-weight: 700; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
  .feed-conf-pos.drive       { color: var(--drive); }
  .feed-conf-pos.reves       { color: var(--reves); }
  .feed-conf-pos.indiferente { color: var(--indiferente); }

  /* Footer */
  .sorteo-feed-footer { display: none; margin-top: 8px; }
  .sorteo-feed-footer.show { display: block; }

  .btn-resortear {
    width: 100%; padding: 16px; background: var(--naranja); color: #fff; border: none;
    border-radius: 13px; font-size: 15px; font-weight: 900; font-family: 'Inter', sans-serif;
    cursor: pointer; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;
    box-shadow: 0 4px 20px rgba(255,107,26,0.35);
  }
  .btn-inicio {
    width: 100%; padding: 12px; background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.7);

    font-family: 'Inter', sans-serif; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
  }

  /* ── MODAL TIPO SORTEO ── */
  #modalModo {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 15, 10, 0.96);
    
    z-index: 80;
    align-items: center;

  .modal-opcion {

  /* ── LAYOUT FIJO: header arriba, barra abajo, lista en el medio ── */

          sizes: "192x192",

<!-- ══ PANTALLA INICIO ══ -->
<div id="pantallaInicio">
  <header>
    <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="36" height="36"><ellipse cx="50" cy="38" rx="26" ry="30" fill="#FF6B1A"/><ellipse cx="50" cy="38" rx="26" ry="30" fill="none" stroke="#fff" stroke-width="3"/><circle cx="40" cy="28" r="3.5" fill="#1A0F0A"/><circle cx="55" cy="25" r="3.5" fill="#1A0F0A"/><circle cx="66" cy="33" r="3.5" fill="#1A0F0A"/><circle cx="34" cy="40" r="3.5" fill="#1A0F0A"/><circle cx="50" cy="38" r="3.5" fill="#1A0F0A"/><circle cx="64" cy="44" r="3.5" fill="#1A0F0A"/><circle cx="40" cy="50" r="3.5" fill="#1A0F0A"/><circle cx="55" cy="52" r="3.5" fill="#1A0F0A"/><rect x="46" y="66" width="8" height="22" rx="4" fill="#FFD93D"/><rect x="46" y="63" width="8" height="8" rx="2" fill="#FF6B1A"/></svg></div>

<script>
const STORAGE_KEY = 'padel_jugadores_v1';
let jugadores = [];
let posSeleccionada = 'drive';
let modoSorteo = 'libre';
let parejasFinales = [];
let parejasForzadas = []; // guardadas desde el panel oculto
let activeIntervals = [];

function init() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) { try { jugadores = JSON.parse(saved); } catch(e) { jugadores = []; } }
  renderJugadores();
  cargarForzadas();
  const inp = document.getElementById('inputNombre');
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') agregarJugador(); });
  inp.addEventListener('input', e => { e.target.value = e.target.value.toUpperCase(); });
}

function seleccionarPos(btn) {
  document.querySelectorAll('.pos-btn').forEach(b => b.className = 'pos-btn');
  posSeleccionada = btn.dataset.pos;
  btn.classList.add('active-' + posSeleccionada);
}
function agregarJugador() {
  const input = document.getElementById('inputNombre');
  const nombre = input.value.trim().toUpperCase();
  if (!nombre) { input.focus(); return; }
  jugadores.push({ id: Date.now(), nombre, pos: posSeleccionada });
  guardar(); renderJugadores();
  input.value = ''; input.focus(); ocultarError();
}
function eliminarJugador(id) {
  jugadores = jugadores.filter(j => j.id !== id);
  guardar(); renderJugadores();
}
function guardar() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(jugadores));
}
function guardarForzadas() {
  localStorage.setItem('padel_forzadas_v1', JSON.stringify(parejasForzadas));
}
function cargarForzadas() {
  try {
    const saved = localStorage.getItem('padel_forzadas_v1');
    if (saved) parejasForzadas = JSON.parse(saved);
  } catch(e) { parejasForzadas = []; }
}
function renderJugadores() {
  const lista = document.getElementById('listaJugadores');
  const badge = document.getElementById('countBadge');
  badge.textContent = jugadores.length;
  badge.className = 'count-badge' + (jugadores.length > 0 && jugadores.length % 2 === 0 ? ' ok' : '');
  if (jugadores.length === 0) {
    lista.innerHTML = '<div class="empty-state">Todavía no hay jugadores.<br>Agregá los del día arriba.</div>';
    return;
  }
  lista.innerHTML = jugadores.map(j => `
    <div class="jugador-item">
      <div class="pos-dot ${j.pos}"></div>
      <div class="jugador-nombre">${h(j.nombre)}</div>
      <span class="pos-label ${j.pos}">${lp(j.pos)}</span>
      <button class="btn-del" onclick="eliminarJugador(${j.id})">×</button>
    </div>
  `).join('');
}
function lp(pos) { return pos === 'drive' ? 'Drive' : pos === 'reves' ? 'Revés' : 'Ambos'; }

function abrirModalModo() {
  ocultarError();
  if (jugadores.length < 2) { mostrarError('Necesitás al menos 2 jugadores.'); return; }
  if (jugadores.length % 2 !== 0) { mostrarError(`Tenés ${jugadores.length} jugadores. Necesitás un número par.`); return; }
  document.getElementById('modalModo').classList.add('show');
}

function cerrarModalModo(e) {
  if (!e || e.target === document.getElementById('modalModo')) {
    document.getElementById('modalModo').classList.remove('show');
  }
}

function elegirModo(modo) {
  document.getElementById('modalModo').classList.remove('show');
  modoSorteo = modo;
  sortear();
}

function sortear() {
  ocultarError();
  stopIntervals();
  if (jugadores.length < 2) { mostrarError('Necesitás al menos 2 jugadores.'); return; }
  if (jugadores.length % 2 !== 0) { mostrarError(`Tenés ${jugadores.length} jugadores. Necesitás un número par.`); return; }

  // IDs ya forzados
  const idsForzados = new Set(parejasForzadas.flatMap(p => [p[0].id, p[1].id]));
  const libres = jugadores.filter(j => !idsForzados.has(j.id));

  let parejasLibres;
  if (modoSorteo === 'libre') {
    const s = shuffle([...libres]);
    parejasLibres = [];
    for (let i = 0; i < s.length; i += 2) parejasLibres.push([s[i], s[i+1]]);
  } else {
    // Por posición solo con los jugadores libres
    const tmpJugadores = jugadores;
    jugadores = libres;
    const r = sorteoPorPosicion();
    jugadores = tmpJugadores;
    if (!r.ok) { mostrarError(r.error); return; }
    parejasLibres = r.parejas;
  }

  // Mezclar forzadas + libres aleatoriamente
  const todas = shuffle([...parejasForzadas, ...parejasLibres]);
  parejasFinales = todas;

  document.getElementById('feedCards').innerHTML = '';
  document.getElementById('feedFooter').classList.remove('show');
  document.getElementById('feedDots').innerHTML = parejasFinales.map((_, i) => `<div class="feed-dot" id="fdot${i}"></div>`).join('');

  document.getElementById('pantallaInicio').style.display = 'none';
  document.getElementById('pantallaSorteo').classList.add('show');
  document.getElementById('pantallaSorteo').scrollTop = 0;

  animarFeed(0);
}

function sorteoLibre() {
  const s = shuffle([...jugadores]);
  const p = [];
  for (let i = 0; i < s.length; i += 2) p.push([s[i], s[i+1]]);
  return p;
}

function sorteoPorPosicion() {
  const n = jugadores.length / 2;
  const drives = shuffle(jugadores.filter(j => j.pos === 'drive'));
  const reves  = shuffle(jugadores.filter(j => j.pos === 'reves'));
  const ambos  = shuffle(jugadores.filter(j => j.pos === 'indiferente'));
  const dSide = [...drives], rSide = [...reves], pool = [...ambos];
  while (pool.length > 0 && (dSide.length < n || rSide.length < n)) {
    if (dSide.length <= rSide.length && dSide.length < n) dSide.push(pool.shift());
    else if (rSide.length < n) rSide.push(pool.shift());
    else break;
  }
  if (dSide.length !== n || rSide.length !== n) {
    return { ok: false, error: `No se pueden armar ${n} parejas Drive+Revés. Revisá las posiciones o usá el modo Libre.` };
  }
  shuffle(dSide); shuffle(rSide);
  return { ok: true, parejas: dSide.map((d, i) => [d, rSide[i]]) };
}

// ── Animación feed ──
function animarFeed(idx) {
  if (idx >= parejasFinales.length) {
    document.getElementById('feedFooter').classList.add('show');
    lanzarConfetti();
    return;
  }

  const par = parejasFinales[idx];
  const ITEM_H = 130;
  const total = jugadores.length + 1;

  parejasFinales.forEach((_, i) => {
    const d = document.getElementById('fdot' + i);
    if (d) d.className = 'feed-dot' + (i < idx ? ' done' : i === idx ? ' current' : '');
  });

  const cardEl = document.createElement('div');
  cardEl.className = 'feed-card active';
  cardEl.id = `fc${idx}`;
  cardEl.innerHTML = `
    <div class="feed-card-header">
      <div class="feed-card-num">Pareja ${idx + 1}</div>
      <div class="feed-card-check">✅</div>
    </div>
    <div class="feed-slot-cols" id="fcols${idx}">
      <div class="feed-slot-col">
        <div class="feed-reel" id="frA${idx}"></div>
      </div>
      <div class="feed-plus">+</div>
      <div class="feed-slot-col">
        <div class="feed-reel" id="frB${idx}"></div>
      </div>
    </div>
  `;
  document.getElementById('feedCards').appendChild(cardEl);
  setTimeout(() => cardEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);

  buildFeedReel(`frA${idx}`, jugadores, par[0]);
  buildFeedReel(`frB${idx}`, jugadores, par[1]);

  const reelA = document.getElementById(`frA${idx}`);
  const reelB = document.getElementById(`frB${idx}`);
  let tA = 0, tB = 0;

  const intA = setInterval(() => { tA = (tA + 1) % total; reelA.style.transform = `translateY(-${tA * ITEM_H}px)`; }, 70);
  const intB = setInterval(() => { tB = (tB + 1) % total; reelB.style.transform = `translateY(-${tB * ITEM_H}px)`; }, 70);
  activeIntervals.push(intA, intB);

  setTimeout(() => {
    clearInterval(intA);
    activeIntervals = activeIntervals.filter(x => x !== intA);
    reelA.style.transition = 'transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1)';
    reelA.style.transform = `translateY(-${(total - 1) * ITEM_H}px)`;
    if (navigator.vibrate) navigator.vibrate([35, 20, 35]);
  }, 1300);

  setTimeout(() => {
    clearInterval(intB);
    activeIntervals = activeIntervals.filter(x => x !== intB);
    reelB.style.transition = 'transform 0.45s cubic-bezier(0.22, 0.61, 0.36, 1)';
    reelB.style.transform = `translateY(-${(total - 1) * ITEM_H}px)`;
    if (navigator.vibrate) navigator.vibrate([35, 20, 70]);

    setTimeout(() => {
      const card = document.getElementById(`fc${idx}`);
      card.classList.remove('active');
      card.classList.add('locked');
      const d = document.getElementById('fdot' + idx);
      if (d) d.className = 'feed-dot done';

      // Reemplazar slot por display estático
      const colsEl = document.getElementById(`fcols${idx}`);
      colsEl.outerHTML = `
        <div class="feed-confirmed-cols" id="fcols${idx}">
          <div class="feed-conf-pj">
            <div class="feed-conf-nombre">${h(par[0].nombre)}</div>
            <div class="feed-conf-pos ${par[0].pos}">${lp(par[0].pos)}</div>
          </div>
          <div class="feed-plus">+</div>
          <div class="feed-conf-pj">
            <div class="feed-conf-nombre">${h(par[1].nombre)}</div>
            <div class="feed-conf-pos ${par[1].pos}">${lp(par[1].pos)}</div>
          </div>
        </div>
      `;
      setTimeout(() => animarFeed(idx + 1), 420);
    }, 500);
  }, 2100);
}

function buildFeedReel(id, jugadores, ganador) {
  const reel = document.getElementById(id);
  reel.style.transition = 'none';
  reel.style.transform = 'translateY(0)';
  const items = [...shuffle([...jugadores]), ganador];
  reel.innerHTML = items.map(j => `
    <div class="feed-slot-item">
      <div class="feed-slot-nombre">${h(j.nombre)}</div>
      <div class="feed-slot-pos ${j.pos}">${lp(j.pos)}</div>
    </div>
  `).join('');
}

// ── Confetti cálido ──
function lanzarConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const cols = ['#FF6B1A','#FFD93D','#FF4757','#FF9F43','#FFF8F0','#FFBE76','#FF7675'];
  const ps = Array.from({length: 140}, () => ({
    x: Math.random() * canvas.width, y: -10 - Math.random() * 100,
    w: 6 + Math.random() * 9, h: 3 + Math.random() * 5,
    color: cols[Math.floor(Math.random() * cols.length)],
    rot: Math.random() * Math.PI * 2,
    vx: (Math.random() - 0.5) * 5, vy: 2 + Math.random() * 5,
    vr: (Math.random() - 0.5) * 0.18, opacity: 1
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    ps.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (frame > 70) p.opacity -= 0.013;
      if (p.y < canvas.height + 20 && p.opacity > 0) {
        alive = true;
        ctx.save(); ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.translate(p.x, p.y); ctx.rotate(p.rot);
        ctx.fillStyle = p.color; ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      }
    });
    frame++;
    if (alive && frame < 200) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ── Nav ──
function volverInicio() {
  stopIntervals();
  document.getElementById('pantallaSorteo').classList.remove('show');
  document.getElementById('pantallaInicio').style.display = 'flex';
}
function limpiarTodo() {
  if (!confirm('¿LIMPIAR TODA LA LISTA?')) return;
  stopIntervals();
  jugadores = []; parejasForzadas = []; guardar(); guardarForzadas(); renderJugadores();
}

// ── Helpers ──
function stopIntervals() { activeIntervals.forEach(clearInterval); activeIntervals = []; }
function mostrarError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
function ocultarError() { document.getElementById('errorMsg').style.display = 'none'; }
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function h(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
initLogoTap();

// ── PANEL MANUAL: 3 toques en el logo ──
let logoTaps = 0;
let logoTimer = null;

function initLogoTap() {
  const logo = document.querySelector('.logo');
  if (!logo) return;
  logo.style.cursor = 'pointer';
  logo.addEventListener('click', () => {
    logo.classList.remove('logo-tap');
    void logo.offsetWidth; // reflow para reiniciar animación
    logo.classList.add('logo-tap');

    logoTaps++;
    clearTimeout(logoTimer);

    if (logoTaps >= 3) {
      logoTaps = 0;
      abrirPanelManual();
      return;
    }

    logoTimer = setTimeout(() => { logoTaps = 0; }, 1000);
  });
}

function abrirPanelManual() {
  if (jugadores.length < 2) {
    mostrarError('Necesitás al menos 2 jugadores.');
    return;
  }
  if (jugadores.length % 2 !== 0) {
    mostrarError('Necesitás un número par de jugadores.');
    return;
  }

  renderPanelManual();
  document.getElementById('panelManual').classList.add('show');
}

function cerrarPanelManual() {
  document.getElementById('panelManual').classList.remove('show');
}

function renderPanelManual() {
  const container = document.getElementById('pmParejas');
  container.innerHTML = '';
  // Mostrar las parejas forzadas guardadas
  parejasForzadas.forEach((par, i) => {
    const fila = crearFilaPareja(i);
    container.appendChild(fila);
    setTimeout(() => {
      const selA = document.getElementById(`pmA${i}`);
      const selB = document.getElementById(`pmB${i}`);
      if (selA) selA.value = par[0].id;
      if (selB) selB.value = par[1].id;
    }, 0);
  });
}

function crearFilaPareja(idx) {
  const div = document.createElement('div');
  div.className = 'pm-pareja';
  div.id = `pmPareja${idx}`;

  const opts = '<option value="">— Elegir —</option>' +
    jugadores.map(j => `<option value="${j.id}">${h(j.nombre)} (${lp(j.pos)})</option>`).join('');

  div.innerHTML = `
    <div class="pm-pareja-label" style="display:flex;justify-content:space-between;align-items:center;">
      <span>Pareja forzada ${idx + 1}</span>
      <button onclick="eliminarParejaManual(this)" style="background:none;border:none;color:rgba(255,255,255,0.4);font-size:18px;cursor:pointer;padding:0 4px;">×</button>
    </div>
    <div class="pm-pareja-slots">
      <select class="pm-select" id="pmA${idx}">${opts}</select>
      <div class="pm-plus">+</div>
      <select class="pm-select" id="pmB${idx}">${opts}</select>
    </div>
  `;
  return div;
}

function eliminarParejaManual(btn) {
  btn.closest('.pm-pareja').remove();
  // Renumerar
  document.querySelectorAll('.pm-pareja').forEach((el, i) => {
    el.id = `pmPareja${i}`;
    el.querySelector('select:first-of-type').id = `pmA${i}`;
    el.querySelector('select:last-of-type').id = `pmB${i}`;
    el.querySelector('.pm-pareja-label span').textContent = `Pareja forzada ${i + 1}`;
  });
  // Guardar el estado actual sin la eliminada
  _sincronizarYGuardarForzadas();
}
function _sincronizarYGuardarForzadas() {
  const filas = document.querySelectorAll('.pm-pareja');
  const nuevas = [];
  filas.forEach(fila => {
    const idA = parseInt(fila.querySelector('select:first-of-type')?.value);
    const idB = parseInt(fila.querySelector('select:last-of-type')?.value);
    if (idA && idB && idA !== idB) {
      const jA = jugadores.find(j => j.id === idA);
      const jB = jugadores.find(j => j.id === idB);
      if (jA && jB) nuevas.push([jA, jB]);
    }
  });
  parejasForzadas = nuevas;
  guardarForzadas();
}

function agregarParejaManual() {
  const n = document.getElementById('pmParejas').children.length;
  document.getElementById('pmParejas').appendChild(crearFilaPareja(n));
}

function confirmarManual() {
  const filas = document.querySelectorAll('.pm-pareja');
  const parejas = [];
  const usados = new Set();
  let error = false;

  // 1. Procesar parejas forzadas
  filas.forEach((fila, i) => {
    if (error) return;
    const idA = parseInt(fila.querySelector('select:first-of-type')?.value);
    const idB = parseInt(fila.querySelector('select:last-of-type')?.value);

    if (!idA || !idB) {
      alert(`PAREJA FORZADA ${i + 1}: ELEGÍ LOS DOS JUGADORES.`);
      error = true; return;
    }
    if (idA === idB) {
      alert(`PAREJA FORZADA ${i + 1}: LOS DOS JUGADORES DEBEN SER DISTINTOS.`);
      error = true; return;
    }
    if (usados.has(idA) || usados.has(idB)) {
      alert(`UN JUGADOR ESTÁ REPETIDO EN VARIAS PAREJAS.`);
      error = true; return;
    }
    usados.add(idA); usados.add(idB);
    parejas.push([jugadores.find(j => j.id === idA), jugadores.find(j => j.id === idB)]);
  });

  if (error) return;

  // Guardar SOLO las parejas que cargó el usuario en el panel
  parejasForzadas = parejas;
  guardarForzadas();
  cerrarPanelManual();

  // Feedback visual sutil: badge naranja en el logo
  const logo = document.querySelector('.logo');
  logo.style.outline = '2px solid var(--naranja)';
  logo.style.borderRadius = '8px';
  setTimeout(() => { logo.style.outline = 'none'; }, 2000);
}
